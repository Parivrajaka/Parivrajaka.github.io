<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prasoon Awasthi</title>
    <meta name="description" content="Prasoon Awasthi — Director of Engineering. Personal site, projects, and contact.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 560px;
            width: 100%;
        }

        .header {
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #888;
            font-weight: 400;
        }

        .divider {
            height: 1px;
            background: #222;
            margin: 2rem 0;
        }

        .section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem 0;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
            border-bottom: 1px solid transparent;
            width: fit-content;
        }

        .link:hover {
            color: #4a9eff;
        }

        .link .arrow {
            color: #555;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .link:hover .arrow {
            transform: translateX(4px);
            color: #4a9eff;
        }

        .project-desc {
            color: #888;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .footer {
            margin-top: 4rem;
            color: #444;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Prasoon Awasthi</h1>
            <p class="subtitle">Director of Engineering</p>
        </div>

        <div class="divider"></div>

        <div class="section">
            <div class="section-title">Projects</div>
            <div class="links">
                <a href="https://prasoonawasthi.com/sanchyt_web" class="link">
                    Sanchyt <span class="arrow">→</span>
                </a>
                <p class="project-desc">A family expense management app — reads UPI transactions, privacy-first and encrypted.</p>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Connect</div>
            <div class="links">
                <a href="https://www.linkedin.com/in/prasoonawasthi/" class="link" target="_blank" rel="noopener">
                    LinkedIn <span class="arrow">↗</span>
                </a>
                <a href="mailto:support@prasoonawasthi.com" class="link">
                    support@prasoonawasthi.com <span class="arrow">→</span>
                </a>
            </div>
        </div>

        <div class="footer">
            © 2026 Prasoon Awasthi
        </div>
    </div>
</body>
</html>
